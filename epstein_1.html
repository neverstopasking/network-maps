  {id:"Jeffrey Epstein",group:"central",size:32,lyric:"'A kid from Brooklyn...skipped two grades, graduated at sixteen, got into an elite math program at NYU, dropped out, and at twenty-one was hired to teach physics at the most exclusive private school in Manhattan without a degree'",info:"Grew up in Coney Island, Brooklyn. Father was a groundskeeper. Skipped two grades, enrolled at NYU, dropped out. Never finished a degree. Somehow ended up teaching at Manhattan's most elite prep school with no credentials, then on Wall Street the next day after being fired, then in the personal orbit of David Rockefeller, the Trilateral Commission, and the intelligence services of at least three countries. His only publicly known client was Leslie Wexner, who gave him a $77M mansion and full power of attorney. An Austrian passport found in his safe after his 2019 arrest had his photo, a false name, and a Saudi address -- state-level intelligence tradecraft. Ten thousand videos seized, still sealed. Died in federal custody August 10, 2019. Both cell cameras malfunctioned. Guards skipped required checks. His brother's forensic pathologist concluded homicide.",orgs:["Dalton School","Bear Stearns","Trilateral Commission","Council on Foreign Relations","Rockefeller University"]},

  {id:"Mossad / Israeli Intel",group:"intelligence",size:19,lyric:"'Robert Maxwell...sold stolen surveillance software called PROMIS for the CIA and Mossad...Six heads of Israeli intelligence at his funeral, totally normal for a book publisher'",info:"Six heads of Israeli intelligence attended Robert Maxwell's funeral in 1991 -- an extraordinary display for a supposed book publisher. Maxwell sold PROMIS spyware with intelligence backdoors for Mossad. Rafi Eitan -- head of Lekem, Israel's Bureau of Scientific Intelligence -- orchestrated the PROMIS theft. Ehud Barak, former Israeli PM and Director of Aman (military intelligence), visited Epstein's properties 36+ documented times after his 2008 conviction. Jane Doe 200 testified in court that Epstein told her he was a Mossad agent. Former NSA counterintelligence officer John Schindler stated the Epstein operation appeared to be an Israeli intelligence blackmail operation.",orgs:["Robert Maxwell","Ghislaine Maxwell","PROMIS","Unit 8200"]},

  {id:"PROMIS Software",group:"intelligence",size:14,lyric:"'...sold stolen surveillance software called PROMIS for the CIA and Mossad'",info:"Prosecutor's Management Information System -- developed by Inslaw Inc. for the DOJ under a $10M government contract. A federal bankruptcy judge ruled in 1987 the DOJ stole it through "trickery, fraud and deceit." Israeli spymaster Rafi Eitan arranged to have it covertly modified with an intelligence backdoor. Robert Maxwell then distributed the backdoored version worldwide -- to foreign governments, banks, intelligence agencies, and law firms. Every buyer's systems were then accessible in real-time by CIA and Mossad. Journalist Danny Casolaro was investigating PROMIS when he was found dead in a hotel bathtub in 1991, wrists slashed 10-12 times. Ruled suicide. His briefcase of notes was missing. Former AG Elliot Richardson called the suicide ruling highly implausible. PROMIS is the documented precursor to modern mass surveillance.",orgs:["Robert Maxwell","CIA","Mossad","DOJ"]},

  {id:"Alan Greenberg",group:"finance",size:15,lyric:"'One of those students at the Dalton school was the daughter of Bear Stearns CEO Alan Greenberg. Epstein told people that relationship got him his Wall Street job'",info:"Known as "Ace." CEO of Bear Stearns for decades. His daughter was a student in Epstein's math class at the Dalton School. Epstein told people this connection was how he went from fired schoolteacher to one of Wall Street's most powerful investment banks overnight -- with no degree, no credentials, no background. That one prep school connection launched an otherwise inexplicable career. Greenberg's daughter being in Epstein's class was either a remarkable coincidence or is itself a detail worth examining given that Donald Barr -- an OSS veteran -- was the headmaster who hired Epstein without credentials in the first place.",orgs:["Bear Stearns","Dalton School"]},

  {id:"Ronald Lauder",group:"finance",size:14,lyric:"'...Ronald Lauder, a secret network of billionaire donors coordinating pro-Israel strategy'",info:"Estee Lauder heir and billionaire. U.S. Ambassador to Austria under Reagan 1986-1987. President of the World Jewish Congress. Member of the Mega Group alongside Wexner and Bronfman -- his apartment was reportedly one of the venues where the group met. Has documented connections to Israeli intelligence through diplomatic and political activities. Close relationship with Netanyahu spanning decades. Part of the same financial orbit that Epstein was embedded in.",orgs:["Mega Group","Estée Lauder","Israeli government"]},
  {id:"Steven Hoffenberg",group:"finance",size:15,lyric:"'Hoffenberg introduced him to Robert Maxwell'",info:"Founder of Towers Financial, a debt collection company. Convicted in 1995 of running a $475 million Ponzi scheme -- one of the largest in U.S. history before Madoff. Epstein worked as a consultant for Hoffenberg in the early 1980s during the period the fraud was being built, though Epstein was never charged. Hoffenberg has stated in multiple on-record interviews that Douglas Leese used their connection to recruit Epstein for British intelligence. Also introduced Epstein to Robert Maxwell -- the connection that pulled Epstein into the world of Mossad, CIA, and the PROMIS surveillance network. Hoffenberg spent his post-prison years trying to tell this story publicly. He died in 2022.",orgs:["Towers Financial","Robert Maxwell","Douglas Leese"]},

  {id:"David Rockefeller",group:"institution",size:17,lyric:"'David Rockefeller personally mentored him, a college dropout from Coney Island at the table with the man who built the globalist infrastructure'",info:"Chairman of Chase Manhattan Bank and one of the most powerful private citizens of the 20th century. Founded the Trilateral Commission in 1973 and served as longtime chairman of the Council on Foreign Relations. Personally mentored Jeffrey Epstein -- a college dropout from Brooklyn with no credentials -- and sponsored his entry into both institutions. Nobody has ever explained why. IMPORTANT: The Rockefeller family are documented Northern Baptists of German Protestant descent. They built Riverside Church in Manhattan and funded Baptist missionary work since the 1800s. The family is not Jewish. Belgian survivor Anneke Lucas has stated in on-record public testimony that Rockefeller personally abused her as a child in the early 1970s -- this is survivor testimony, not court-verified, but it directly implicates the same man who mentored Epstein.",orgs:["Trilateral Commission","Council on Foreign Relations","Chase Manhattan","Rockefeller University"]},

  {source:"Alan Greenberg",target:"Bear Stearns",strength:3},
  {source:"Alan Greenberg",target:"Dalton School",strength:2},
  {source:"Alan Greenberg",target:"Jeffrey Epstein",strength:2},
  {source:"David Rockefeller",target:"Trilateral Commission",strength:3},
  {source:"David Rockefeller",target:"Council on Foreign Relations",strength:3},
  {source:"David Rockefeller",target:"Jeffrey Epstein",strength:2},
  {source:"David Rockefeller",target:"Rockefeller University",strength:3},
];

// Legend
const legEl = document.getElementById("legend");
Object.entries(C).forEach(([k,col])=>{
  const row = document.createElement("div");
  row.className = "lr";
  row.innerHTML = `<div class="ld" style="background:${col}"></div><span>${GL[k]}</span>`;
  legEl.appendChild(row);
});

const netEl = document.getElementById("net");
const W = netEl.clientWidth, H = netEl.clientHeight;
const svg = d3.select("#net").append("svg");

svg.append("rect").attr("width","100%").attr("height","100%").attr("fill","#060b12");

const defs = svg.append("defs");
const rg = defs.append("radialGradient").attr("id","rg").attr("cx","50%").attr("cy","50%").attr("r","50%");
rg.append("stop").attr("offset","0%").attr("stop-color","#1a3a5c").attr("stop-opacity","0.35");
rg.append("stop").attr("offset","100%").attr("stop-color","#060b12").attr("stop-opacity","0");
svg.append("rect").attr("width","100%").attr("height","100%").attr("fill","url(#rg)");

defs.append("marker").attr("id","arr").attr("viewBox","0 0 10 10").attr("refX",24).attr("refY",5)
  .attr("markerWidth",4).attr("markerHeight",4).attr("orient","auto-start-reverse")
  .append("path").attr("d","M2 1L8 5L2 9").attr("fill","none")
  .attr("stroke","rgba(255,255,255,0.2)").attr("stroke-width",1.5)
  .attr("stroke-linecap","round").attr("stroke-linejoin","round");

const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.2,6]).on("zoom",e=>g.attr("transform",e.transform)));

const sim = d3.forceSimulation(nodes)
  .force("link",d3.forceLink(links).id(d=>d.id).distance(d=>165-d.strength*20))
  .force("charge",d3.forceManyBody().strength(-580))
  .force("center",d3.forceCenter(W/2,H/2))
  .force("collision",d3.forceCollide().radius(d=>d.size+30));

const linkEl = g.selectAll("line").data(links).enter().append("line")
  .attr("stroke","rgba(255,255,255,0.35)")
  .attr("stroke-width",d=>Math.max(1.2,d.strength*0.8))
  .attr("marker-end","url(#arr)");

const nodeG = g.selectAll("g.n").data(nodes).enter().append("g").attr("class","n")
  .style("cursor","pointer")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

nodeG.append("circle").attr("class","pulse")
  .attr("r",d=>d.size+10).attr("fill",d=>C[d.group])
  .attr("fill-opacity",0.05).attr("stroke","none");

nodeG.append("circle").attr("class","ring")
  .attr("r",d=>d.size).attr("fill",d=>C[d.group])
  .attr("fill-opacity",0.12).attr("stroke",d=>C[d.group])
  .attr("stroke-width",d=>d.group==="central"?2:1).attr("stroke-opacity",0.7);

nodeG.append("circle").attr("class","core")
  .attr("r",d=>Math.max(4,d.size*0.3))
  .attr("fill",d=>C[d.group]).attr("fill-opacity",1);

// Labels with dark stroke for readability
nodeG.append("text").attr("class","lbl")
  .text(d=>d.id)
  .attr("text-anchor","middle")
  .attr("y",d=>d.size+17)
  .attr("font-size",d=>d.group==="central"?13:11)
  .attr("font-family","inherit")
  .attr("font-weight",d=>d.group==="central"?"700":"500")
  .attr("fill",d=>C[d.group])
  .attr("fill-opacity",d=>d.group==="central"?1:0.8)
  .attr("paint-order","stroke")
  .attr("stroke","#060b12")
  .attr("stroke-width","4px")
  .attr("stroke-linejoin","round")
  .attr("pointer-events","none");

const panel = document.getElementById("info-panel");

function setActive(d){
  const conn = new Set([d.id]);
  links.forEach(l=>{
    if(l.source.id===d.id) conn.add(l.target.id);
    if(l.target.id===d.id) conn.add(l.source.id);
  });
  nodeG.select(".ring")
    .attr("fill-opacity",n=>conn.has(n.id)?0.25:0.04)
    .attr("stroke-opacity",n=>conn.has(n.id)?1:0.12);
  nodeG.select(".core").attr("fill-opacity",n=>conn.has(n.id)?1:0.18);
  nodeG.select(".lbl")
    .attr("fill-opacity",n=>n.id===d.id?1:conn.has(n.id)?0.9:0.15)
    .attr("font-size",n=>n.id===d.id?14:n.group==="central"?13:11)
    .attr("font-weight",n=>n.id===d.id||conn.has(n.id)?"700":"500");
  linkEl
    .attr("stroke",l=>(l.source.id===d.id||l.target.id===d.id)?C[d.group]:"rgba(255,255,255,0.06)")
    .attr("stroke-width",l=>(l.source.id===d.id||l.target.id===d.id)?Math.max(2,l.strength):0.5)
    .attr("stroke-opacity",1);
  const orgs=(d.orgs||[]).map(o=>`<span class="ptag" style="background:${C[d.group]}22;color:${C[d.group]};border:0.5px solid ${C[d.group]}44">${o}</span>`).join("");
  panel.innerHTML=`
    <div class="pname" style="color:${C[d.group]}">${d.id}</div>
    ${orgs?`<div class="ptags">${orgs}</div>`:""}
    <div class="plyric" style="border-left-color:${C[d.group]}66">${d.lyric}</div>
    <div class="pdesc">${d.info}</div>
  `;
}

function resetAll(){
  nodeG.select(".ring").attr("fill-opacity",0.12).attr("stroke-opacity",0.7);
  nodeG.select(".core").attr("fill-opacity",1);
  nodeG.select(".lbl")
    .attr("fill-opacity",d=>d.group==="central"?1:0.8)
    .attr("font-size",d=>d.group==="central"?13:11)
    .attr("font-weight",d=>d.group==="central"?"700":"500");
  linkEl.attr("stroke","rgba(255,255,255,0.35)").attr("stroke-width",d=>Math.max(1.2,d.strength*0.8)).attr("stroke-opacity",1);
  panel.innerHTML=`<div id="hint">Click any node to explore connections and source material</div>`;
}

nodeG.on("click",(e,d)=>{e.stopPropagation();setActive(d);});
svg.on("click",resetAll);

function filterGroup(grp,btn){
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const show=d=>grp==="all"||d.group===grp||d.group==="central";
  nodeG.style("opacity",d=>show(d)?1:0.05);
  linkEl.attr("stroke-opacity",l=>grp==="all"||(show(l.source)||show(l.target))?1:0.01);
  resetAll();
}
window.filterGroup=filterGroup;

sim.on("tick",()=>{
  linkEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
});
</script>
</body>
</html>
