
<style>
* { box-sizing: border-box; }
#wrap { background: #080d14; border-radius: 10px; overflow: hidden; position: relative; }
#controls { display:flex; gap:6px; flex-wrap:wrap; padding:10px 12px 0; align-items:center; background:#080d14; }
.btn { background:rgba(255,255,255,0.04); border:0.5px solid rgba(255,255,255,0.12); border-radius:20px; padding:4px 12px; font-size:10px; cursor:pointer; color:rgba(255,255,255,0.45); transition:all .2s; font-family:var(--font-sans); letter-spacing:0.04em; }
.btn:hover { background:rgba(255,255,255,0.08); color:rgba(255,255,255,0.7); }
.btn.active { background:rgba(255,255,255,0.12); color:#fff; border-color:rgba(255,255,255,0.35); }
#net { width:100%; height:460px; }
#info-panel { margin:0; padding:12px 16px 14px; background:#0d1520; border-top:0.5px solid rgba(255,255,255,0.07); font-size:11.5px; line-height:1.7; min-height:70px; }
#info-panel .node-name { font-size:13px; font-weight:500; color:#fff; margin-bottom:4px; }
.tag { display:inline-block; font-size:9.5px; padding:2px 8px; border-radius:20px; margin:0 3px 4px 0; font-weight:500; letter-spacing:0.03em; }
.lyric-quote { font-style:italic; font-size:10.5px; color:rgba(255,255,255,0.4); border-left:2px solid rgba(255,255,255,0.15); padding-left:8px; margin-bottom:6px; line-height:1.6; }
.node-desc { color:rgba(255,255,255,0.65); font-size:11px; }
#hint { color:rgba(255,255,255,0.25); font-size:11px; }
</style>

  <div id="info-panel"><span id="hint">Click any node to explore connections and source material</span></div>

  {id:"George H.W. Bush",      group:"political",    size:13, lyric:"'...same era Bush was running the agency then the country'", info:"CIA Director 1976–77, VP 1981–89, President 1989–93. Oversaw CIA during the Southern Air Transport era. Iran-Contra aware as VP. The institutional continuity of intelligence leadership across decades.", orgs:["CIA","Iran-Contra","Republican establishment"]},

const W = document.getElementById("net").clientWidth, H = 460;
const svg = d3.select("#net").append("svg").attr("width","100%").attr("height","100%").attr("viewBox",`0 0 ${W} ${H}`);

// Dark background
svg.append("rect").attr("width",W).attr("height",H).attr("fill","#080d14");

// Subtle grid
const grid = svg.append("g").attr("opacity",0.03);
for(let x=0;x<W;x+=40) grid.append("line").attr("x1",x).attr("y1",0).attr("x2",x).attr("y2",H).attr("stroke","#fff").attr("stroke-width",0.5);
for(let y=0;y<H;y+=40) grid.append("line").attr("x1",0).attr("y1",y).attr("x2",W).attr("y2",y).attr("stroke","#fff").attr("stroke-width",0.5);

svg.append("defs").append("marker")
  .attr("id","arr").attr("viewBox","0 0 10 10").attr("refX",22).attr("refY",5)
  .attr("markerWidth",4).attr("markerHeight",4).attr("orient","auto-start-reverse")
  .append("path").attr("d","M2 1L8 5L2 9").attr("fill","none").attr("stroke","rgba(255,255,255,0.3)")
  .attr("stroke-width",1.5).attr("stroke-linecap","round").attr("stroke-linejoin","round");

const g = svg.append("g");
svg.call(d3.zoom().scaleExtent([0.25,5]).on("zoom", e=>g.attr("transform",e.transform)));

const sim = d3.forceSimulation(nodes)
  .force("link", d3.forceLink(links).id(d=>d.id).distance(d=>140-d.strength*18))
  .force("charge", d3.forceManyBody().strength(-450))
  .force("center", d3.forceCenter(W/2, H/2))
  .force("collision", d3.forceCollide().radius(d=>d.size+18));

// Glow filter per color - using simple approach
const defs = svg.select("defs");

const linkEl = g.selectAll("line").data(links).enter().append("line")
  .attr("stroke","rgba(255,255,255,0.08)")
  .attr("stroke-width", d=>Math.max(0.5, d.strength*0.6))
  .attr("marker-end","url(#arr)");

const nodeG = g.selectAll("g.n").data(nodes).enter().append("g").attr("class","n")
  .style("cursor","pointer")
  .call(d3.drag()
    .on("start",(e,d)=>{if(!e.active)sim.alphaTarget(0.3).restart();d.fx=d.x;d.fy=d.y})
    .on("drag",(e,d)=>{d.fx=e.x;d.fy=e.y})
    .on("end",(e,d)=>{if(!e.active)sim.alphaTarget(0);d.fx=null;d.fy=null}));

// Outer glow ring
nodeG.append("circle")
  .attr("r", d=>d.size+6)
  .attr("fill", d=>C[d.group])
  .attr("fill-opacity", 0.04)
  .attr("stroke","none");

// Mid ring
nodeG.append("circle")
  .attr("r", d=>d.size)
  .attr("fill", d=>C[d.group])
  .attr("fill-opacity", 0.1)
  .attr("stroke", d=>C[d.group])
  .attr("stroke-width", d=>d.group==="central"?1.5:0.8)
  .attr("stroke-opacity", 0.6);

// Inner dot
nodeG.append("circle")
  .attr("r", d=>Math.max(3, d.size*0.28))
  .attr("fill", d=>C[d.group])
  .attr("fill-opacity", 0.9);

// Label
nodeG.append("text")
  .text(d=>d.id)
  .attr("text-anchor","middle")
  .attr("dy", d=>d.size+12)
  .attr("font-size", d=>d.group==="central"?10:9)
  .attr("font-family","var(--font-sans)")
  .attr("fill", d=>C[d.group])
  .attr("fill-opacity",0.85)
  .attr("font-weight","500")
  .attr("pointer-events","none")
  .attr("letter-spacing","0.02em");

// Legend
const legData = Object.entries(C);
const legG = svg.append("g").attr("transform","translate(10,10)");
legData.forEach(([k,col],i)=>{
  const row = legG.append("g").attr("transform",`translate(0,${i*15})`);
  row.append("circle").attr("cx",5).attr("cy",5).attr("r",3.5).attr("fill",col).attr("fill-opacity",0.8);
  row.append("text").attr("x",13).attr("y",9).attr("font-size","9px").attr("font-family","var(--font-sans)").attr("fill",col).attr("fill-opacity",0.7).text(k.charAt(0).toUpperCase()+k.slice(1));
});

const panel = document.getElementById("info-panel");

nodeG.on("click",(e,d)=>{
  e.stopPropagation();
  const connected = new Set([d.id]);
  links.forEach(l=>{
    if(l.source.id===d.id) connected.add(l.target.id);
    if(l.target.id===d.id) connected.add(l.source.id);
  });

  nodeG.select("circle:nth-child(2)")
    .attr("fill-opacity", n=>connected.has(n.id)?0.18:0.04)
    .attr("stroke-opacity", n=>connected.has(n.id)?0.9:0.15);
  nodeG.select("circle:nth-child(3)")
    .attr("fill-opacity", n=>connected.has(n.id)?1:0.2);
  nodeG.selectAll("text")
    .attr("fill-opacity", n=>connected.has(n.id)?0.9:0.15);

  linkEl
    .attr("stroke", l=>(l.source.id===d.id||l.target.id===d.id)?C[d.group]:"rgba(255,255,255,0.04)")
    .attr("stroke-opacity", l=>(l.source.id===d.id||l.target.id===d.id)?0.7:0.3)
    .attr("stroke-width", l=>(l.source.id===d.id||l.target.id===d.id)?Math.max(1,l.strength*0.8):0.3);

  const orgs = (d.orgs||[]).map(o=>`<span class="tag" style="background:${C[d.group]}22;color:${C[d.group]};border:0.5px solid ${C[d.group]}44">${o}</span>`).join("");
  panel.innerHTML = `
    <div class="node-name" style="color:${C[d.group]}">${d.id}</div>
    ${orgs?`<div style="margin-bottom:6px">${orgs}</div>`:""}
    <div class="lyric-quote" style="border-left-color:${C[d.group]}66">${d.lyric}</div>
    <div class="node-desc">${d.info}</div>
  `;
});

svg.on("click",()=>{
  nodeG.select("circle:nth-child(2)").attr("fill-opacity",0.1).attr("stroke-opacity",0.6);
  nodeG.select("circle:nth-child(3)").attr("fill-opacity",0.9);
  nodeG.selectAll("text").attr("fill-opacity",0.85);
  linkEl.attr("stroke","rgba(255,255,255,0.08)").attr("stroke-opacity",1).attr("stroke-width",d=>Math.max(0.5,d.strength*0.6));
  panel.innerHTML=`<span id="hint">Click any node to explore connections and source material</span>`;
});

let activeGroup="all";
function filterGroup(grp,btn){
  activeGroup=grp;
  document.querySelectorAll(".btn").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
  const show = d => grp==="all"||d.group===grp||d.group==="central";
  nodeG.style("opacity", d=>show(d)?1:0.06);
  linkEl.attr("stroke-opacity", l=>grp==="all"||(show(l.source)||show(l.target))?0.12:0.02);
  panel.innerHTML=`<span id="hint">Click any node to explore connections and source material</span>`;
}
window.filterGroup=filterGroup;

sim.on("tick",()=>{
  linkEl.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
  nodeG.attr("transform",d=>`translate(${d.x},${d.y})`);
});
</script>
